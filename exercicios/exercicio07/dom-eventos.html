<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM + Eventos</title>
    <script src="dom-eventos.js" defer></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
        }

        .aprovado {
            color: blue;
        }

        .reprovado {
            color: red;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Exercício DOM + Eventos</h1>
        <section>
            <h2>Calculadora de Média</h2>
            <form action="" method="post">
                <p>
                    <label for="nota1">Nota 1:</label>
                    <input type="number" required min="0" max="10" step="0.01" id="nota1">

                    <label for="nota2">Nota 2:</label>
                    <input type="number" required min="0" max="10" step="0.01" id="nota2">
                </p>
                <button id="enviar">Calcular Média</button>
            </form>
        </section>

        <section>
            <h2>Resultados</h2>
            <div id="resultados">
                <p id="media"></p>
                <p id="situacao"></p>
            </div>
        </section>
    </div>
</body>

</html>
