<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria com SimpleLightbox</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js" defer></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/js/splide.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>
</head>

<body>

    <h1>Exercício 08: Galeria de Fotos usando a lib SimpleLightbox</h1>
    <p>Site oficial: <a href="https://simplelightbox.js.org/" target="_blank">SimpleLightbox</a></p>

    <p><i>Veja a documentação no site oficial e, seguindo as instruções, monte a estrutura necessária para implementar
            uma galeria de imagens.</i></p>

    <hr>

    <section class="splide gallery">
        <div class="splide__track">
            <ul class="splide__list">

                <li class="splide__slide">
                    <a href="imagens/grande1.jpg">
                        <img src="imagens/thumb1.jpg" alt="Montanha em escada">
                    </a>
                </li>
                <li class="splide__slide">
                    <a href="imagens/grande2.jpg">
                        <img src="imagens/thumb2.jpg" alt="Céu a noite estrelado">
                    </a>
                </li>
                <li class="splide__slide">
                    <a href="imagens/grande3.jpg">
                        <img src="imagens/thumb3.jpg" alt="Praia com montanha">
                    </a>
                </li>
                <li class="splide__slide">
                    <a href="imagens/grande4.jpg">
                        <img src="imagens/thumb4.jpg" alt="Trem">
                    </a>
                </li>
                <li class="splide__slide">
                    <a href="imagens/grande5.jpg">
                        <img src="imagens/thumb5.jpg" alt="Lua vermelha">
                    </a>
                </li>
                <li class="splide__slide">
                    <a href="imagens/grande6.jpg">
                        <img src="imagens/thumb6.jpg" alt="Paisagem de montanha">
                    </a>
                </li>

            </ul>
        </div>
    </section>

    <div class="galeria gallery">
        <!-- Coloque aqui cada foto pequena (thumb) dentro de um link <a>.
        E cada link, deve apontar para a versão grande da foto. -->







    </div>



</body>

</html>
