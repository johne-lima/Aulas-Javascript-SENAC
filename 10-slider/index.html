<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider com Splide</title>
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js" defer></script>

  <script src="script.js" defer></script>
</head>

<body>

  <h1>Slider de conteúdo usando a lib Splide</h1>
  <p>Site oficial: <a href="https://splidejs.com/" target="_blank">https://splidejs.com/</a></p>

  <hr>

  <div class="slider splide">
    <div class="splide__track">
      <ul class="splide__list">
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto01.jpg" alt="">
            <figcaption>Férias em Londres</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto02.jpg" alt="">
            <figcaption>Casa na árvore</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto03.jpg" alt="">
            <figcaption>Prédios de Abu Dabhi</figcaption>
          </figure>
        </li>
        <li class="splide__slide">
          <figure>
            <img src="imagens/slider-foto04.jpg" alt="">
            <figcaption>Prédios com luz vermelha</figcaption>
          </figure>
        </li>
      </ul>
    </div>
  </div>

  


</body>

</html>
